site_name: Toy Zombies
site_description: Página Oficial de Toy Zombies

theme:
  name: material
  custom_dir: overrides
  language: es
  logo: img/logo.webp
  favicon: img/icono.webp
  # Esta línea obliga a todos los dispositivos a usar letra de Terminal (Máquina de escribir)
  font:
    text: Roboto Mono
    code: Roboto Mono
  # Configuración de colores (Tema oscuro por defecto)
  palette:
    scheme: slate
    primary: black
    accent: red

# Barra de navegación (Menú superior/lateral)
nav:
  - Inicio: index.md
  - Sinópsis: lore.md
  - Toy Zombies: bestiario.md
  - Mecánicas: mecanicas.md
  - AniMall's Shopping: mapas.md
  - Personajes: personajes.md
  - Agradecimientos Especiales: gracias.md
  - Actualizaciones: updates.md

extra_css:
  - stylesheets/extra.css

# Configuración extra para agregar el selector de idiomas en la cabecera
extra:
  alternate:
    - name: Español
      link: /
      lang: es
    - name: English
      link: /en/index.html  # <-- Agregamos index.html aquí
      lang: en