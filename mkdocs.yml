site_name: Toy Zombies
site_description: Página Oficial de Toy Zombies
site_url: https://hec-thor-tech.github.io/toy-zombies-wiki/

theme:
  name: material
  custom_dir: overrides
  language: es
  logo: img/logo.webp
  favicon: img/icono.webp
  font:
    text: Roboto Mono
    code: Roboto Mono
  palette:
    scheme: slate
    primary: black
    accent: red

# 1. INYECTAR ESTE MÓDULO DE PLUGINS:
plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: es
          default: true
          name: Español
        - locale: en
          name: English
          nav_translations:
            Inicio: Home
            Sinópsis: Synopsis
            Toy Zombies: Toy Zombies
            Mecánicas: Mechanics
            AniMall's Shopping: AniMall's Shopping
            Personajes: Characters
            Agradecimientos Especiales: Special Thanks
            Actualizaciones: Updates

nav:
  - Inicio: index.md
  - Sinópsis: lore.md
  - Toy Zombies: bestiario.md
  - Mecánicas: mecanicas.md
  - AniMall's Shopping: mapas.md
  - Personajes: personajes.md
  - Agradecimientos Especiales: gracias.md
  - Actualizaciones: updates.md

extra_css:
  - stylesheets/extra.css
